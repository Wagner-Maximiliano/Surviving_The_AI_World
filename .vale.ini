# Vale config — Surviving the AI World
# Docs: https://vale.sh/docs/topics/config/

StylesPath = styles
MinAlertLevel = warning
Vocab = Surviving

# proselint is pulled by `vale sync` but is intentionally NOT in BasedOnStyles
# below (see why). Left here so it can be re-enabled at the Phase 6 editorial pass.
Packages = proselint

[*.md]
# Only the project's OWN deliberate rules gate a PR:
#   - Surviving.no-em-dash  = error   (em dash is an AI tell; banned, CI-blocking)
#   - Surviving.banned-phrases = warning (advisory)
# The third-party bundles (Vale built-ins like Spelling, and the whole proselint
# pack) are deliberately left OUT of the blocking set. They flag editorial nuances
# — spelling of cited author names + AI neologisms, smart quotes, ellipsis glyphs,
# cliches — that should never fail an autonomous scaffolding PR and were derailing
# real work. Copy-editing is the Phase 6 editorial pass on final human prose, not
# per-PR CI. Re-add `Vale, proselint` here (and tune levels) when Phase 6 opens.
BasedOnStyles = Surviving

# Don't lint Pandoc YAML frontmatter or fenced code blocks.
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\$+[^\n$]+\$+)
