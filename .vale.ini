# Vale config — Surviving the AI World
# Docs: https://vale.sh/docs/topics/config/

StylesPath = styles
MinAlertLevel = warning
Vocab = Surviving

# Pulled with `vale sync` after `Packages` is enabled (see README).
Packages = proselint

[*.md]
BasedOnStyles = Vale, proselint, Surviving

# Spelling is advisory, not a gate. The book cites many author names and AI-era
# neologisms that no base dictionary knows; hard-gating them would fail PRs for
# correctly-cited sources and fight the autonomous pipeline. Real copy-editing is
# the Phase 6 editorial pass on final prose, not per-PR CI. Vale still reports
# spelling as a warning so it stays visible; it just no longer fails the build.
Vale.Spelling = warning

# Don't lint Pandoc YAML frontmatter or fenced code blocks.
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\$+[^\n$]+\$+)
